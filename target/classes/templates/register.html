<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | QuizMaster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .waves {
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: 0;
            left: 0;
            z-index: 0;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.2" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,170.7C1248,160,1344,128,1392,112L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"/></svg>');
            background-size: cover;
            animation: wave 10s linear infinite;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            50% { transform: translateX(-25%); }
            100% { transform: translateX(-50%); }
        }

        .register-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
            animation: fadeInScale 0.6s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .brand p {
            color: #999;
            font-size: 0.9em;
            margin-top: 8px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.9em;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .register-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
            margin-top: 10px;
        }

        .register-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(72, 187, 120, 0.4);
        }

        .alert {
            padding: 12px 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 0.9em;
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .links {
            text-align: center;
            margin-top: 25px;
            color: #666;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            color: #764ba2;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .feature {
            text-align: center;
            font-size: 0.85em;
            color: #666;
        }

        .feature span {
            font-size: 1.3em;
            display: block;
            margin-bottom: 5px;
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 35px 25px;
                margin: 20px;
            }
            .features {
                grid-template-columns: 1fr;
            }
            .brand h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="waves">
        <div class="wave"></div>
    </div>

    <div class="register-card">
        <div class="brand">
            <h1>✨ Rejoignez-nous</h1>
            <p>Créez votre compte gratuitement</p>
        </div>

        <div th:if="${error}" class="alert" th:text="${error}">
            ⚠️ Une erreur est survenue
        </div>

        <form method="post" th:action="@{/inscription}" th:object="${user}">
            <div class="input-group">
                <label>👤 Nom d'utilisateur</label>
                <input type="text" th:field="*{username}" placeholder="Choisissez un nom" required>
            </div>

            <div class="input-group">
                <label>📧 Email</label>
                <input type="email" th:field="*{email}" placeholder="votre@email.com" required>
            </div>

            <div class="input-group">
                <label>🔒 Mot de passe</label>
                <input type="password" th:field="*{password}" placeholder="Créez un mot de passe" required>
            </div>

            <button type="submit" class="register-btn">Créer mon compte</button>
        </form>

        <div class="links">
            <p>Déjà un compte ? <a href="/connexion">Se connecter</a></p>
        </div>

        <div class="features">
            <div class="feature"><span>📚</span>Quiz variés</div>
            <div class="feature"><span>📊</span>Suivi des scores</div>
            <div class="feature"><span>🏆</span>Classements</div>
            <div class="feature"><span>🎯</span>Défis quotidiens</div>
        </div>
    </div>
</body>
</html>
