<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${quiz.titre} + ' | QuizMaster'">Quiz | QuizMaster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #f8f9fa;
            min-height: 100vh;
        }

        .navbar {
            background: white;
            padding: 20px 40px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand h2 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8em;
            font-weight: 700;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .quiz-header {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .quiz-header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .quiz-meta {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            color: #888;
        }

        .progress-container {
            margin-top: 20px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #666;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .question-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }

        .question-card:hover {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.2em;
            font-weight: 500;
            margin-bottom: 20px;
            color: #333;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option input {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(72, 187, 120, 0.4);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }
            .options {
                grid-template-columns: 1fr;
            }
            .quiz-header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <h2>✨ QuizMaster</h2>
            </div>
            <div class="user-avatar">👤</div>
        </div>
    </nav>

    <div class="container">
        <a href="/quiz" class="back-link">← Retour aux quiz</a>

        <div class="quiz-header">
            <h1 th:text="${quiz.titre}">Titre du quiz</h1>
            <p th:text="${quiz.description}">Description</p>
            <div class="quiz-meta">
                <span>📝 <span th:text="${quiz.questions.size()}">0</span> questions</span>
                <span>⏱️ 15 minutes</span>
            </div>

            <div class="progress-container">
                <div class="progress-info">
                    <span>Progression</span>
                    <span id="answeredCount">0/<span th:text="${quiz.questions.size()}">0</span></span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <form method="post" th:action="@{'/quiz/' + ${quiz.id} + '/repondre'}" id="quizForm">
            <div th:each="question, iter : ${quiz.questions}" class="question-card">
                <div class="question-number" th:text="'Question ' + ${iter.index + 1}">Question 1</div>
                <div class="question-text" th:text="${question.texte}">Texte de la question</div>
                <div class="options">
                    <label class="option">
                        <input type="radio" th:name="'reponse_' + ${question.id}" th:value="1" onchange="updateProgress()">
                        <span th:text="${question.option1}">Option 1</span>
                    </label>
                    <label class="option">
                        <input type="radio" th:name="'reponse_' + ${question.id}" th:value="2" onchange="updateProgress()">
                        <span th:text="${question.option2}">Option 2</span>
                    </label>
                    <label class="option" th:if="${question.option3 != null}">
                        <input type="radio" th:name="'reponse_' + ${question.id}" th:value="3" onchange="updateProgress()">
                        <span th:text="${question.option3}">Option 3</span>
                    </label>
                    <label class="option" th:if="${question.option4 != null}">
                        <input type="radio" th:name="'reponse_' + ${question.id}" th:value="4" onchange="updateProgress()">
                        <span th:text="${question.option4}">Option 4</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="submit-btn">✅ Voir mes résultats</button>
        </form>
    </div>

    <script>
        function updateProgress() {
            const total = document.querySelectorAll('.question-card').length;
            const repondues = document.querySelectorAll('input[type="radio"]:checked').length;
            document.getElementById('answeredCount').innerHTML = repondues + '/' + total;
            const pourcentage = (repondues / total) * 100;
            document.getElementById('progressFill').style.width = pourcentage + '%';
        }
    </script>
</body>
</html>
