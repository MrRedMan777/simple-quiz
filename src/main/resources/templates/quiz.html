<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${quiz.titre}">Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .question-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .options {
            margin: 15px 0;
        }
        .option {
            margin: 10px 0;
            display: flex;
            align-items: center;
        }
        .option input {
            margin-right: 10px;
        }
        .submit-btn {
            background: #28a745;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1em;
        }
        .back-btn {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2 th:text="${quiz.titre}">Titre du quiz</h2>
        <a href="/quiz" class="back-btn">← Retour</a>
    </div>
    
    <p th:text="${quiz.description}">Description</p>
    <p>Nombre de questions: <span th:text="${quiz.questions.size()}">0</span></p>
    
    <form method="post" th:action="@{'/quiz/' + ${quiz.id} + '/repondre'}">
        <div th:each="question, iter : ${quiz.questions}" class="question-card">
            <h3 th:text="'Question ' + ${iter.index + 1} + ': ' + ${question.texte}">Question</h3>
            
            <div class="options">
                <label class="option">
                    <input type="radio" th:name="'reponse_' + ${question.id}" th:value="1" required>
                    <span th:text="${question.option1}">Option 1</span>
                </label>
                <label class="option">
                    <input type="radio" th:name="'reponse_' + ${question.id}" th:value="2">
                    <span th:text="${question.option2}">Option 2</span>
                </label>
                <label class="option" th:if="${question.option3 != null}">
                    <input type="radio" th:name="'reponse_' + ${question.id}" th:value="3">
                    <span th:text="${question.option3}">Option 3</span>
                </label>
                <label class="option" th:if="${question.option4 != null}">
                    <input type="radio" th:name="'reponse_' + ${question.id}" th:value="4">
                    <span th:text="${question.option4}">Option 4</span>
                </label>
            </div>
        </div>
        
        <button type="submit" class="submit-btn">Valider mes réponses</button>
    </form>
</body>
</html>
