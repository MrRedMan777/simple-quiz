<!-- quizzes.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Quiz | Quiz App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            background: #f8f9fa;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: white;
            padding: 20px 40px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.9);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-brand h2 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8em;
            font-weight: 700;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-link {
            text-decoration: none;
            color: #555;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }

        .nav-link:hover {
            color: #667eea;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-avatar:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .dropdown {
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 15px 0;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
        }

        .user-menu:hover .dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown a, .dropdown button {
            display: block;
            width: 100%;
            padding: 10px 20px;
            text-align: left;
            border: none;
            background: none;
            color: #555;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
        }

        .dropdown a:hover, .dropdown button:hover {
            background: #f5f5f5;
            color: #667eea;
        }

        .dropdown hr {
            margin: 10px 0;
            border: none;
            border-top: 1px solid #e0e0e0;
        }

        /* Main content */
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 40px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.5s;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .title p {
            color: #999;
            font-size: 1.1em;
        }

        .search-bar {
            background: white;
            border-radius: 50px;
            padding: 5px;
            display: flex;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            width: 300px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: none;
            font-size: 1em;
        }

        .search-bar input:focus {
            outline: none;
        }

        .search-bar button {
            width: 45px;
            height: 45px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 5px;
        }

        .search-bar button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .categories {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            animation: fadeIn 0.5s 0.2s both;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
            from { opacity: 0; }
        }

        .category-btn {
            padding: 10px 25px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            background: white;
            color: #666;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-btn:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            animation: fadeInUp 0.5s 0.4s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quiz-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s;
            position: relative;
        }

        .quiz-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 40px rgba(0,0,0,0.1);
        }

        .quiz-image {
            height: 150px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
        }

        .quiz-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            font-size: 0.85em;
            font-weight: 500;
        }

        .quiz-content {
            padding: 25px;
        }

        .quiz-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .quiz-description {
            color: #999;
            font-size: 0.95em;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .quiz-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #666;
            font-size: 0.9em;
        }

        .meta-item i {
            color: #667eea;
        }

        .quiz-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .difficulty {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .difficulty.easy {
            background: #d4edda;
            color: #155724;
        }

        .difficulty.medium {
            background: #fff3cd;
            color: #856404;
        }

        .difficulty.hard {
            background: #f8d7da;
            color: #721c24;
        }

        .start-btn {
            padding: 10px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .quiz-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }

            .nav-menu {
                display: none;
            }

            .container {
                padding: 0 20px;
            }

            .header-section {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .search-bar {
                width: 100%;
            }

            .quiz-grid {
                grid-template-columns: 1fr;
            }

            .categories {
                justify-content: center;
            }

            .title h1 {
                font-size: 2em;
            }
        }

        @media (max-width: 480px) {
            .quiz-meta {
                flex-wrap: wrap;
            }

            .quiz-footer {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .start-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <h2>✨ QuizMaster</h2>
            </a>

            <div class="nav-menu">
                <a href="/quiz" class="nav-link">Accueil</a>
                <a href="/quiz" class="nav-link">Quiz</a>
                <a href="/classement" class="nav-link">Classement</a>
                <a href="/profil" class="nav-link">Profil</a>
            </div>

            <div class="user-menu">
                <div class="user-avatar" th:text="${#authentication.name.substring(0,1)}">C</div>
                <div class="dropdown">
                    <a href="/profil">👤 Mon profil</a>
                    <a href="/quiz/resultats">📊 Mes résultats</a>
                    <hr>
                    <form method="post" th:action="@{/deconnexion}">
                        <button type="submit">🚪 Déconnexion</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <div class="title">
                <h1>📚 Quiz disponibles</h1>
                <p th:text="${#strings.isEmpty(quizs)} ? 'Aucun quiz disponible' : 'Choisissez un quiz pour commencer'">
                    Choisissez un quiz pour commencer
                </p>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Rechercher un quiz..." id="searchInput">
                <button onclick="searchQuiz()">🔍</button>
            </div>
        </div>

        <div class="categories">
            <button class="category-btn active" onclick="filterCategory('all')">Tous</button>
            <button class="category-btn" onclick="filterCategory('culture')">📚 Culture</button>
            <button class="category-btn" onclick="filterCategory('java')">☕ Java</button>
            <button class="category-btn" onclick="filterCategory('science')">🔬 Sciences</button>
            <button class="category-btn" onclick="filterCategory('sport')">⚽ Sports</button>
            <button class="category-btn" onclick="filterCategory('geo')">🌍 Géo</button>
        </div>

        <div class="quiz-grid" id="quizGrid">
            <div th:each="quiz : ${quizs}" class="quiz-card" 
                 th:attr="data-category=${quiz.titre.toLowerCase().contains('java') ? 'java' : 
                                        (quiz.titre.toLowerCase().contains('science') ? 'science' :
                                        (quiz.titre.toLowerCase().contains('sport') ? 'sport' :
                                        (quiz.titre.toLowerCase().contains('geo') ? 'geo' : 'culture')))}">
                <div class="quiz-image">
                    <span th:switch="${quiz.titre}">
                        <span th:case="*'Java'*">☕</span>
                        <span th:case="*'Science'*">🔬</span>
                        <span th:case="*'Sport'*">⚽</span>
                        <span th:case="*'Géo'*">🌍</span>
                        <span th:case="*'Culture'*">📚</span>
                        <span th:case="*">📝</span>
                    </span>
                    <div class="quiz-badge" th:text="${quiz.questions.size()} + ' questions'"></div>
                </div>
                <div class="quiz-content">
                    <h3 class="quiz-title" th:text="${quiz.titre}">Titre</h3>
                    <p class="quiz-description" th:text="${quiz.description}">Description</p>
                    
                    <div class="quiz-meta">
                        <span class="meta-item">
                            <i>📊</i>
                            <span th:text="${quiz.questions.size()} + ' questions'"></span>
                        </span>
                        <span class="meta-item">
                            <i>⏱️</i>
                            <span>30 min</span>
                        </span>
                    </div>

                    <div class="quiz-footer">
                        <span class="difficulty easy">Facile</span>
                        <a th:href="@{'/quiz/' + ${quiz.id}}" class="start-btn">Commencer →</a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${quizs.empty}" style="text-align: center; padding: 100px 20px;">
            <div style="font-size: 4em; margin-bottom: 20px;">📭</div>
            <h2 style="color: #333; margin-bottom: 10px;">Aucun quiz disponible</h2>
            <p style="color: #999;">Revenez plus tard pour découvrir de nouveaux quiz !</p>
        </div>
    </div>

    <script>
        function searchQuiz() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.quiz-card');
            
            cards.forEach(card => {
                const title = card.querySelector('.quiz-title').textContent.toLowerCase();
                const desc = card.querySelector('.quiz-description').textContent.toLowerCase();
                
                if (title.includes(search) || desc.includes(search)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function filterCategory(category) {
            // Update active button
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Filter cards
            const cards = document.querySelectorAll('.quiz-card');
            
            cards.forEach(card => {
                if (category === 'all') {
                    card.style.display = 'block';
                } else {
                    const cardCategory = card.getAttribute('data-category');
                    if (cardCategory === category) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                }
            });
        }

        // Animation au scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animation = 'fadeInUp 0.5s both';
                }
            });
        });

        document.querySelectorAll('.quiz-card').forEach(card => {
            observer.observe(card);
        });
    </script>
</body>
</html>
