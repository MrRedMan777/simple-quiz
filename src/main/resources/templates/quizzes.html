<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quiz disponibles</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .quiz-card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { display: inline-block; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 5px; }
        .logout-btn { background: #dc3545; border: none; padding: 8px 16px; color: white; border-radius: 5px; cursor: pointer; }
        .empty { text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h2>📚 Quiz disponibles</h2>
        <form method="post" th:action="@{/deconnexion}">
            <button type="submit" class="logout-btn">Déconnexion</button>
        </form>
    </div>
    
    <div th:each="quiz : ${quizs}" class="quiz-card">
        <h3 th:text="${quiz.titre}">Titre</h3>
        <p th:text="${quiz.description}">Description</p>
        <p>📝 Questions: <span th:text="${quiz.questions.size()}">0</span></p>
        <a th:href="@{'/quiz/' + ${quiz.id}}" class="btn">Commencer →</a>
    </div>
    
    <div th:if="${quizs == null or quizs.empty}" class="empty">
        <p>Aucun quiz disponible pour le moment.</p>
    </div>
</body>
</html>
