<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Résultats</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .score-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        .score {
            font-size: 4em;
            font-weight: bold;
            margin: 10px 0;
        }
        .message {
            font-size: 1.2em;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }
        .btn-primary {
            background: #667eea;
        }
        .btn-success {
            background: #48bb78;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 th:text="${quiz.titre}">Résultats</h2>
            <a href="/quiz" style="color: #667eea;">← Retour</a>
        </div>
        
        <div class="score-card">
            <h1>Votre score</h1>
            <div class="score" th:text="${score} + '/' + ${total}">5/10</div>
            <div class="message" th:if="${score == total}">🏆 Parfait !</div>
            <div class="message" th:if="${score >= total/2 and score < total}">👍 Bien joué !</div>
            <div class="message" th:if="${score < total/2}">💪 Continue !</div>
        </div>
        
        <div class="btn-group">
            <a href="/quiz" class="btn btn-primary">Tous les quiz</a>
            <a th:href="@{'/quiz/' + ${quiz.id}}" class="btn btn-success">Recommencer</a>
        </div>
    </div>
</body>
</html>
