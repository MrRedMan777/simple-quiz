<!-- register.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Quiz App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .waves {
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: 0;
            left: 0;
            z-index: 0;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.3" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,170.7C1248,160,1344,128,1392,112L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"/></svg>');
            background-size: cover;
            animation: wave 10s linear infinite;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            50% { transform: translateX(-25%); }
            100% { transform: translateX(-50%); }
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
            animation: fadeInScale 0.8s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .brand p {
            color: #999;
            font-size: 0.95em;
            margin-top: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.95em;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .input-group input.error {
            border-color: #f00;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .password-strength {
            margin-top: 10px;
            height: 5px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff4d4d, #ffa64d, #4dff4d);
            transition: width 0.3s;
        }

        .terms {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            color: #666;
            font-size: 0.95em;
        }

        .terms input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .terms a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .register-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .register-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .register-btn:active {
            transform: translateY(-1px);
        }

        .register-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .register-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            left: calc(50% - 10px);
            top: calc(50% - 10px);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 0.95em;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .login-link a:hover {
            color: #764ba2;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 0.95em;
            animation: slideIn 0.3s;
            border: 1px solid;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border-color: #fcc;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .feature {
            text-align: center;
            font-size: 0.9em;
            color: #666;
        }

        .feature span {
            font-size: 1.5em;
            display: block;
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .register-card {
                padding: 40px 30px;
            }

            .brand h1 {
                font-size: 2em;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 30px 20px;
            }

            .brand h1 {
                font-size: 1.8em;
            }

            .input-group input {
                padding: 12px 15px;
            }

            .register-btn {
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="waves">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="container">
        <div class="register-card">
            <div class="brand">
                <h1>✨ Rejoignez-nous</h1>
                <p>Créez votre compte gratuitement</p>
            </div>

            <div th:if="${error}" class="alert alert-error" th:text="${error}">
                ⚠️ Une erreur est survenue
            </div>

            <form method="post" th:action="@{/inscription}" th:object="${user}" id="registerForm">
                <div class="input-group">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" th:field="*{username}" 
                           placeholder="Choisissez un nom d'utilisateur" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" 
                           placeholder="votre@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" th:field="*{password}" 
                           placeholder="Créez un mot de passe sécurisé" required>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirmer le mot de passe</label>
                    <input type="password" id="confirmPassword" 
                           placeholder="Confirmez votre mot de passe" required>
                </div>

                <label class="terms">
                    <input type="checkbox" required>
                    J'accepte les <a href="#">conditions d'utilisation</a> et la <a href="#">politique de confidentialité</a>
                </label>

                <button type="submit" class="register-btn" id="submitBtn">
                    Créer mon compte
                </button>
            </form>

            <div class="login-link">
                Déjà un compte ?
                <a href="/connexion">Se connecter</a>
            </div>

            <div class="features">
                <div class="feature">
                    <span>📚</span>
                    Quiz variés
                </div>
                <div class="feature">
                    <span>📊</span>
                    Suivi des scores
                </div>
                <div class="feature">
                    <span>🏆</span>
                    Classements
                </div>
                <div class="feature">
                    <span>🎯</span>
                    Défis quotidiens
                </div>
            </div>
        </div>
    </div>

    <script>
        // Validation du mot de passe en temps réel
        const password = document.getElementById('password');
        const confirm = document.getElementById('confirmPassword');
        const strengthBar = document.getElementById('strengthBar');
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');

        password.addEventListener('input', function() {
            const strength = calculateStrength(this.value);
            strengthBar.style.width = strength + '%';
            
            if (strength < 30) {
                strengthBar.style.background = '#ff4d4d';
            } else if (strength < 60) {
                strengthBar.style.background = '#ffa64d';
            } else {
                strengthBar.style.background = '#4dff4d';
            }
        });

        function calculateStrength(pass) {
            if (!pass) return 0;
            let strength = 0;
            if (pass.length > 6) strength += 20;
            if (pass.length > 9) strength += 20;
            if (/[A-Z]/.test(pass)) strength += 20;
            if (/[0-9]/.test(pass)) strength += 20;
            if (/[^A-Za-z0-9]/.test(pass)) strength += 20;
            return Math.min(100, strength);
        }

        form.addEventListener('submit', function(e) {
            if (password.value !== confirm.value) {
                e.preventDefault();
                alert('Les mots de passe ne correspondent pas !');
                password.classList.add('error');
                confirm.classList.add('error');
                setTimeout(() => {
                    password.classList.remove('error');
                    confirm.classList.remove('error');
                }, 300);
            } else {
                submitBtn.classList.add('loading');
            }
        });
    </script>
</body>
</html>
